<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dheeraj's Neurons</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

    :root {
      --bg: #020810; --soma: #0ff7c8; --soma-glow: #00ffaa;
      --text: #7effd4; --fire: #39ff14; --inhibit: #ff2d78;

    html, body { width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--text); }
    canvas { position:fixed;inset:0;width:100%;height:100%;z-index:0; }

    #panel { position:fixed;top:24px;left:28px;z-index:6;pointer-events:none; }

    #panel-title {
      font-family:'Rajdhani',sans-serif;font-weight:700;

      font-size:clamp(14px,1.45vw,17px);letter-spacing:0.15em;text-transform:uppercase;user-select:none;min-width:170px;
    }
    .nav-item:hover { color:#fff;border-left-color:var(--soma);padding-left:15px;background:rgba(15,247,200,0.06);text-shadow:0 0 12px var(--soma-glow),0 0 30px rgba(0,255,170,0.3); }

    @keyframes pen-write{0%,100%{transform:translate(0,0) rotate(0deg);}35%{transform:translate(2px,1.5px) rotate(1deg);}65%{transform:translate(3.5px,2.5px) rotate(-0.5deg);}}

    @keyframes ink-blink{0%,75%,100%{opacity:0;}45%{opacity:1;}}
    .icon-inkdot{animation:ink-blink 1.3s ease-in-out infinite;}
    @keyframes orbit1{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes orbit2{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
    .icon-orbit1{animation:orbit1 2.4s linear infinite;transform-origin:50% 50%;}
    .icon-orbit2{animation:orbit2 3.6s linear infinite;transform-origin:50% 50%;}
    @keyframes note-bounce{0%,100%{transform:translateY(0) scale(1);}42%{transform:translateY(-4px) scale(1.1);}70%{transform:translateY(-1.5px) scale(1.04);}}
    .icon-note1{animation:note-bounce .9s ease-in-out infinite;}
    .icon-note2{animation:note-bounce .9s ease-in-out infinite .22s;}
    @keyframes line-slide{0%,100%{opacity:.3;transform:scaleX(.82);}50%{opacity:1;transform:scaleX(1);}}
    .icon-ln1{animation:line-slide 1.5s ease-in-out infinite;transform-origin:left;}
    .icon-ln2{animation:line-slide 1.5s ease-in-out infinite .28s;transform-origin:left;}
    .icon-ln3{animation:line-slide 1.5s ease-in-out infinite .55s;transform-origin:left;}
    @keyframes person-glow{0%,100%{opacity:.75;}50%{opacity:1;filter:drop-shadow(0 0 4px var(--soma-glow));}}

    @keyframes bracket-pulse{0%,100%{opacity:.5;transform:scaleX(1);}50%{opacity:1;transform:scaleX(1.15);}}
    .icon-brac1{animation:bracket-pulse 1.1s ease-in-out infinite;transform-origin:right;}

    .icon-cd2{animation:code-dot 1.4s ease-in-out infinite .27s;}
    .icon-cd3{animation:code-dot 1.4s ease-in-out infinite .54s;}

    #stats { position:fixed;top:24px;right:28px;text-align:right;font-size:12px;letter-spacing:0.1em;color:#5abfa0;text-shadow:0 0 6px rgba(90,191,160,0.5);pointer-events:none;z-index:6;line-height:2.2; }
    #stats span { color:var(--soma);text-shadow:0 0 10px var(--soma-glow),0 0 2px #fff;font-size:13px; }

    #controls { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:6;flex-wrap:wrap;justify-content:center; }
    #controls button { background:transparent;border:1px solid #1a9e78;color:#7effd4;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.1em;padding:8px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase;text-shadow:0 0 6px rgba(126,255,212,0.4); }
    #controls button:hover { background:rgba(15,110,88,0.18);border-color:var(--soma);color:var(--soma);box-shadow:0 0 14px rgba(15,247,200,0.25);text-shadow:0 0 10px var(--soma-glow); }
    #btn-hi { border-color:var(--soma)!important;color:var(--soma)!important;font-size:12px!important;padding:8px 22px!important;letter-spacing:0.18em!important;text-shadow:0 0 12px var(--soma-glow)!important;box-shadow:0 0 10px rgba(15,247,200,0.15)!important; }

    #train-status { position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:rgba(2,12,22,0.92);border:1px solid var(--train);padding:7px 20px;font-size:11px;letter-spacing:0.1em;color:var(--train);text-shadow:0 0 10px var(--train);pointer-events:none;z-index:10;display:none;text-align:center;white-space:nowrap; }

    #reader-bg { position:absolute;inset:0;background:rgba(2,8,16,0.76);backdrop-filter:blur(2px); }
    #reader-inner { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(680px,88vw);max-height:78vh;display:flex;flex-direction:column;border:1px solid #0f6e58;background:rgba(2,12,22,0.97);box-shadow:0 0 40px rgba(15,247,200,0.07),inset 0 0 60px rgba(0,0,0,0.5); }
    #reader-header { padding:18px 24px 14px;border-bottom:1px solid #0f3a2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }

    .file-link:hover { color:#fff;border-left-color:var(--soma);background:rgba(15,247,200,0.05);padding-left:20px;text-shadow:0 0 10px rgba(15,247,200,0.4); }

<body>

<div id="panel">

      <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="#0ff7c8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><g class="icon-pen"><path d="M13 2 L18 7 L7 18 L2 18 L2 13 Z"/><line x1="11" y1="4" x2="16" y2="9"/></g><circle class="icon-inkdot" cx="2.8" cy="17.2" r="1.1" fill="#0ff7c8" stroke="none"/></svg></div>Poetry

  NEURONS &nbsp;<span id="sNeurons">0</span><br>

<script>
/* ══ NAV ══ */
document.querySelectorAll('.nav-item').forEach(item=>item.addEventListener('click',()=>openSection(item.dataset.section,item.textContent.trim())));
const reader=document.getElementById('reader'),readerContent=document.getElementById('reader-content'),readerTitle=document.getElementById('reader-section-title');
document.getElementById('back').onclick=()=>{reader.style.display='none';readerContent.innerHTML='';};
function openSection(section,label){readerTitle.textContent=label.toUpperCase();reader.style.display='block';loadIndex(section);for(let i=0;i<4;i++)setTimeout(stimulateRandom,i*130);}
function loadIndex(section){readerContent.innerHTML='<div style="color:#2a7a60;font-size:11px;letter-spacing:0.1em;padding:10px 0;">LOADING...</div>';fetch(`${section}/index.json`).then(r=>r.json()).then(data=>{readerContent.innerHTML='';let files=[];if(Array.isArray(data)){data.forEach(item=>{if(typeof item==='string'){files.push({label:item.replace(/\.[^.]+$/,''),filename:item});}else if(typeof item==='object'){Object.entries(item).forEach(([k,v])=>files.push({label:k,filename:v}));}});}else if(typeof data==='object'){Object.entries(data).forEach(([k,v])=>files.push({label:k,filename:v}));}if(files.length===0){readerContent.innerHTML='<div style="color:#2a7a60;font-size:12px;padding:10px 0;letter-spacing:0.08em;">NO CONTENT FOUND.</div>';return;}files.forEach((f,i)=>{const d=document.createElement('div');d.className='file-link';d.innerHTML=`<span class="fnum">${String(i+1).padStart(2,'0')}</span><span>${f.label}</span>`;d.onclick=()=>loadFile(section,f.filename);readerContent.appendChild(d);});}).catch(()=>{readerContent.innerHTML='<div style="color:#2a7a60;font-size:12px;padding:10px 0;letter-spacing:0.08em;">NO CONTENT FOUND.</div>';});}
function loadFile(section,file){if(file.startsWith('http://')||file.startsWith('https://')){const ytM=file.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(ytM){readerContent.innerHTML=`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;"><iframe src="https://www.youtube.com/embed/${ytM[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>`;return;}const spM=file.match(/spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);if(spM){readerContent.innerHTML=`<iframe src="https://open.spotify.com/embed/${spM[1]}/${spM[2]}" width="100%" height="380" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture"></iframe>`;return;}window.open(file,'_blank');return;}const ext=file.split('.').pop().toLowerCase(),path=`${section}/${file}`,isLocal=['localhost','127.0.0.1'].includes(location.hostname)||location.hostname.endsWith('.local')||location.protocol==='file:';if(['txt','md'].includes(ext)){fetch(path).then(r=>r.text()).then(t=>{readerContent.innerHTML=`<pre>${t}</pre>`;});return;}if(ext==='csv'){fetch(path).then(r=>r.text()).then(text=>{const rows=text.split('\n').map(r=>r.split(','));let html='<table>';rows.forEach((row,i)=>{html+='<tr>'+row.map(c=>`<${i===0?'th':'td'}>${c}</${i===0?'th':'td'}>`).join('')+'</tr>';});readerContent.innerHTML=html+'</table>';});return;}if(['png','jpg','jpeg','gif','webp'].includes(ext)){readerContent.innerHTML=`<img src="${path}" style="max-width:100%;max-height:60vh;display:block;margin:auto;">`;return;}if(['mp3','wav','ogg'].includes(ext)){readerContent.innerHTML=`<audio controls autoplay style="width:100%;margin-top:10px;"><source src="${path}"></audio>`;return;}if(['mp4','webm'].includes(ext)){readerContent.innerHTML=`<video controls autoplay style="max-width:100%;max-height:60vh;"><source src="${path}"></video>`;return;}if(ext==='pdf'){readerContent.innerHTML=`<iframe src="${path}" style="width:100%;height:60vh;border:none;"></iframe>`;return;}if(['doc','docx','xls','xlsx','ppt','pptx'].includes(ext)){if(isLocal)window.open(path,'_blank');else readerContent.innerHTML=`<iframe src="https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(location.origin+'/'+path)}" style="width:100%;height:60vh;border:none;"></iframe>`;return;}window.open(path,'_blank');}
function sayHi(){for(let i=0;i<7;i++)setTimeout(stimulateRandom,i*100);}

/* ══ CONSTANTS ══ */
const PULSE_SPEED    = 1.1;
const SPONT_RATE     = 0.00068;  // per-neuron per-frame spontaneous fire probability
const V_THRESHOLD    = 1.0;      // LIF threshold
const V_LEAK         = 0.038;    // membrane potential decay per frame (resting)
const REFRACTORY_MS  = 2400;
const INHIBIT_RATIO  = 0.22;
const W_BASE         = 0.26;     // base weight — needs multiple pulses to cross threshold
const W_TRAINED      = 0.92;
const W_DECAY        = 0.00025;  // trained weights slowly erode toward base
const MAX_SYN_LEN    = 200;
const SYN_PER        = [2, 5];
const TARGET_FRAC    = 0.12;     // homeostatic target: ~12% active

/* ══ ENGINE STATE ══ */
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H,neurons=[],synapses=[],paused=false;
let spikeCount=0,lastSpikeReset=0,displayedSpikes=0,animId,lastStatsUpdate=0;
let globalLeak=0;         // extra leak from homeostasis
let lastHomeoT=0;

/* ══ POISSON DISC — correct implementation ══
   Returns points in [0,W)×[0,H) that are at least minDist from each other
   AND from existingPts (already in same coordinate space). */
function poissonDisc(W,H,minDist,existingPts){
  const cell=minDist/Math.SQRT2;
  const cols=Math.ceil(W/cell)+1, rows=Math.ceil(H/cell)+1;
  const grid=new Array(cols*rows).fill(null);

  function gi(x,y){return Math.floor(x/cell)+Math.floor(y/cell)*cols;}
  function place(p){
    const c=Math.floor(p.x/cell), r=Math.floor(p.y/cell);
    if(c>=0&&c<cols&&r>=0&&r<rows) grid[c+r*cols]=p;
  }
  function valid(p){
    if(p.x<0||p.y<0||p.x>=W||p.y>=H) return false;
    const c=Math.floor(p.x/cell), r=Math.floor(p.y/cell);
    for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=cols||nr>=rows) continue;
      const n=grid[nc+nr*cols];
      if(n&&Math.hypot(p.x-n.x,p.y-n.y)<minDist) return false;
    }
    return true;
  }

  // Occupy existing points first (so new ones avoid them)
  for(const p of existingPts) place(p);

  const active=[], result=[];
  function tryAdd(p){if(valid(p)){place(p);active.push(p);result.push(p);return true;}return false;}

  // Seed: try up to 300 random spots
  let seeded=false;
  for(let t=0;t<300&&!seeded;t++) seeded=tryAdd({x:Math.random()*W,y:Math.random()*H});
  if(!seeded) return result;

  while(active.length){
    const idx=Math.floor(Math.random()*active.length), pt=active[idx];
    let found=false;
    for(let k=0;k<30;k++){
      const a=Math.random()*Math.PI*2, r=minDist*(1+Math.random());
      if(tryAdd({x:pt.x+Math.cos(a)*r,y:pt.y+Math.sin(a)*r})){found=true;break;}
    }
    if(!found) active.splice(idx,1);
  }
  return result;
}

/* ══ NEURON ══ */
class Neuron{
  constructor(x,y){
    this.x=x;this.y=y;
    this.r=8.25+Math.random()*3;
    this.inhibitory=Math.random()<INHIBIT_RATIO;
    this.v=0;                    // membrane potential
    this.fired=false;
    this.fireTime=-99999;
    this.glowPhase=Math.random()*Math.PI*2;
    this.apicalTree=this._genApical();
    this.basalRoots=this._genBasal();
    this._computeTips();
    this.label=Math.random()<0.25?`N${Math.floor(Math.random()*99)}`:null;
    this.trainHL=false;          // orange highlight = part of trained sequence
    this.replayFlash=0;          // purple flash counter during replay
  }
  _genApical(){const b=[],tl=this.r*2.2+Math.random()*this.r;b.push({x1:0,y1:0,x2:0,y2:-tl});const nb=2+Math.floor(Math.random()*3);for(let i=0;i<nb;i++){const t=0.4+Math.random()*0.5,ox=0,oy=-tl*t,side=i%2===0?1:-1,bl=this.r*(0.8+Math.random()*1.2),bx=ox+side*bl*(0.6+Math.random()*0.4),by=oy-bl*(0.5+Math.random()*0.5);b.push({x1:ox,y1:oy,x2:bx,y2:by});if(Math.random()>0.4){const bl2=bl*0.5;b.push({x1:bx,y1:by,x2:bx+side*bl2*0.5,y2:by-bl2*0.8});}}return b;}
  _genBasal(){const r=[];for(let i=0;i<3+Math.floor(Math.random()*3);i++){const side=i%2===0?1:-1,sp=0.3+Math.random()*0.5,len=this.r*(1.5+Math.random()*1.5),ang=(Math.PI*0.5)+side*sp+(Math.random()-0.5)*0.3,segs=[];for(let s=0;s<4;s++){const sa=ang+(Math.random()-0.5)*0.4;segs.push({dx:Math.cos(sa)*(len/4),dy:Math.sin(sa)*(len/4)});}r.push(segs);}return r;}
  _computeTips(){this.dendriteTips=[];const aB={x:this.x,y:this.y-this.r*1.4},aS=new Set(this.apicalTree.slice(1).map(b=>`${b.x1.toFixed(2)},${b.y1.toFixed(2)}`));for(const b of this.apicalTree)if(!aS.has(`${b.x2.toFixed(2)},${b.y2.toFixed(2)}`))this.dendriteTips.push({x:aB.x+b.x2,y:aB.y+b.y2});const bB={x:this.x,y:this.y+this.r*0.9};for(const segs of this.basalRoots){let px=0,py=0;for(const s of segs){px+=s.dx;py+=s.dy;}this.dendriteTips.push({x:bB.x+px,y:bB.y+py});}}
  inputPoint(){return this.dendriteTips.length?this.dendriteTips[Math.floor(Math.random()*this.dendriteTips.length)]:{x:this.x,y:this.y};}
  axonStart(){return{x:this.x,y:this.y+this.r*0.9};}

  excite(w){
    if(this.fired) return;
    this.v+=w;
    if(this.v>=V_THRESHOLD) this._fire();
  }
  _fire(){
    this.fired=true; this.fireTime=performance.now(); spikeCount++;
    // Check if this neuron starts a trained sequence
    checkSequenceTrigger(this);
  }
  forcefire(){
    if(this.fired) return;
    this.fired=true; this.fireTime=performance.now(); spikeCount++;
  }

  update(now){
    const dt=now-this.fireTime;
    if(this.fired&&dt>REFRACTORY_MS){this.fired=false;this.v=0;}
    if(!this.fired){
      this.v=Math.max(0,this.v-V_LEAK-globalLeak);
      if(Math.random()<SPONT_RATE) this._fire();
    }
    if(this.replayFlash>0) this.replayFlash--;
    this.glowPhase+=0.04;
  }

  draw(now){
    const dt=now-this.fireTime;
    const firing=this.fired&&dt<600, refr=this.fired&&dt>=600;
    const S=this.r, cx=this.x, cy=this.y;
    const isRP=this.replayFlash>0, isTR=this.trainHL;
    let gc,sf,se,dc;
    if(isRP&&firing){sf='rgba(220,80,255,0.9)';se='#bf00ff';gc='rgba(191,0,255,0.5)';dc='rgba(191,0,255,0.6)';}
    else if(firing){sf=this.inhibitory?'rgba(255,100,150,0.9)':'rgba(100,255,180,0.9)';se=this.inhibitory?'#ff2d78':'#39ff14';gc=this.inhibitory?'rgba(255,45,120,0.5)':'rgba(57,255,20,0.5)';dc=this.inhibitory?'rgba(255,45,120,0.6)':'rgba(57,255,20,0.6)';}
    else if(refr){sf='rgba(15,40,70,0.9)';se='#1a3d6e';gc='rgba(10,42,80,0.3)';dc='rgba(20,60,100,0.5)';}
    else{sf=this.inhibitory?'rgba(60,12,30,0.92)':'rgba(10,50,40,0.92)';se=isTR?'#ff9f00':(this.inhibitory?'#7a2040':'#0f6e58');gc=isTR?'rgba(255,159,0,0.18)':(this.inhibitory?'rgba(255,45,120,0.15)':'rgba(15,247,200,0.12)');dc=isTR?'rgba(255,159,0,0.4)':(this.inhibitory?'rgba(180,40,80,0.45)':'rgba(15,180,120,0.45)');}

    ctx.save();ctx.translate(cx,cy-S*1.4);
    for(const b of this.apicalTree){ctx.beginPath();ctx.moveTo(b.x1,b.y1);ctx.lineTo(b.x2,b.y2);ctx.strokeStyle=dc;ctx.lineWidth=b===this.apicalTree[0]?1.5:0.9;ctx.lineCap='round';ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.translate(cx,cy+S*0.9);
    for(const segs of this.basalRoots){ctx.beginPath();ctx.moveTo(0,0);let px=0,py=0;for(const s of segs){px+=s.dx;py+=s.dy;ctx.lineTo(px,py);}ctx.strokeStyle=dc;ctx.lineWidth=0.9;ctx.lineCap='round';ctx.stroke();}
    ctx.restore();

    const glowR=S*(firing?3.5*(1-dt/1200)+2:2.2);
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);
    grd.addColorStop(0,gc);grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,cy,glowR,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();

    const apY=cy-S*1.4,baY=cy+S*0.9,hW=S*1.1,bu=S*0.55;
    const bLx=cx-hW,bRx=cx+hW;
    ctx.beginPath();ctx.moveTo(cx,apY);
    ctx.bezierCurveTo(cx+bu,apY+(baY-apY)*0.35,bRx+bu*0.5,baY-(baY-apY)*0.3,bRx,baY);
    ctx.bezierCurveTo(bRx-hW*0.3,baY+S*0.18,bLx+hW*0.3,baY+S*0.18,bLx,baY);
    ctx.bezierCurveTo(bLx-bu*0.5,baY-(baY-apY)*0.3,cx-bu,apY+(baY-apY)*0.35,cx,apY);
    ctx.closePath();
    const bG=ctx.createLinearGradient(cx,apY,cx,baY);
    bG.addColorStop(0,firing?(this.inhibitory?'rgba(255,150,180,0.6)':'rgba(150,255,200,0.6)'):(this.inhibitory?'rgba(80,15,35,0.7)':'rgba(15,80,60,0.7)'));
    bG.addColorStop(1,sf);
    ctx.fillStyle=bG;ctx.fill();
    ctx.strokeStyle=se;ctx.lineWidth=firing?2:(isTR?1.8:1.2);
    ctx.shadowColor=firing?se:(isTR?'#ff9f00':'transparent');ctx.shadowBlur=firing?16:(isTR?8:0);
    ctx.stroke();ctx.shadowBlur=0;

    const nR=S*0.32;
    const nG=ctx.createRadialGradient(cx-nR*0.3,cy+S*0.1-nR*0.3,0,cx,cy+S*0.1,nR);
    nG.addColorStop(0,firing?(this.inhibitory?'rgba(255,120,160,0.9)':'rgba(120,255,180,0.9)'):'rgba(30,80,100,0.9)');
    nG.addColorStop(1,firing?(this.inhibitory?'rgba(180,30,70,0.8)':'rgba(30,180,100,0.8)'):'rgba(10,30,50,0.9)');
    ctx.beginPath();ctx.arc(cx,cy+S*0.1,nR,0,Math.PI*2);ctx.fillStyle=nG;ctx.fill();
    ctx.strokeStyle=firing?se:'rgba(15,180,140,0.4)';ctx.lineWidth=0.8;ctx.stroke();
    if(this.label){ctx.fillStyle='rgba(15,247,200,0.4)';ctx.font='7px Share Tech Mono';ctx.fillText(this.label,cx+hW+3,cy+3);}
  }
}

/* ══ SYNAPSE ══ */
class Synapse{
  constructor(pre,post){
    this.pre=pre;this.post=post;this.pulses=[];
    this.excitatory=!pre.inhibitory;
    this.cpOff=(Math.random()-0.5)*60;
    this.startPt=pre.axonStart();this.endPt=post.inputPoint();
    this.weight=W_BASE;
  }
  addPulse(){this.pulses.push({progress:0});}
  _cp(){const mx=(this.startPt.x+this.endPt.x)/2,my=(this.startPt.y+this.endPt.y)/2,dx=this.endPt.x-this.startPt.x,dy=this.endPt.y-this.startPt.y,nx=-dy,ny=dx,len=Math.sqrt(nx*nx+ny*ny)||1;return{x:mx+(nx/len)*this.cpOff,y:my+(ny/len)*this.cpOff};}
  _bez(t){const cp=this._cp();return{x:(1-t)*(1-t)*this.startPt.x+2*(1-t)*t*cp.x+t*t*this.endPt.x,y:(1-t)*(1-t)*this.startPt.y+2*(1-t)*t*cp.y+t*t*this.endPt.y};}
  update(){
    for(const p of this.pulses) p.progress+=0.012*PULSE_SPEED;
    const arrived=this.pulses.filter(p=>p.progress>=1);
    this.pulses=this.pulses.filter(p=>p.progress<1);
    for(const _ of arrived){
      if(this.excitatory) this.post.excite(this.weight);
      else this.post.v=Math.max(0,this.post.v-0.5);
    }
    if(this.weight>W_BASE) this.weight=Math.max(W_BASE,this.weight-W_DECAY);
  }
  draw(){
    const cp=this._cp(),hp=this.pulses.length>0;
    const tr=this.weight>W_BASE+0.08;
    ctx.beginPath();ctx.moveTo(this.startPt.x,this.startPt.y);ctx.quadraticCurveTo(cp.x,cp.y,this.endPt.x,this.endPt.y);
    ctx.strokeStyle=tr?(hp?'rgba(255,159,0,0.55)':'rgba(255,159,0,0.18)'):(hp?(this.excitatory?'#0f6e5860':'#6e0f3060'):'#0a3d6230');
    ctx.lineWidth=tr?(hp?2:1.2):(hp?1.2:0.6);ctx.stroke();
    const tip=this._bez(0.88),tipN=this._bez(0.92),ang=Math.atan2(tipN.y-tip.y,tipN.x-tip.x);
    ctx.save();ctx.translate(tipN.x,tipN.y);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(-3,2.5);ctx.lineTo(-3,-2.5);ctx.closePath();
    ctx.fillStyle=tr?'rgba(255,159,0,0.5)':(this.excitatory?'rgba(15,247,200,0.25)':'rgba(255,45,120,0.25)');ctx.fill();ctx.restore();
    for(const p of this.pulses){
      const pos=this._bez(p.progress),t1=this._bez(Math.max(0,p.progress-0.12)),t2=this._bez(Math.max(0,p.progress-0.06));
      ctx.beginPath();ctx.moveTo(t1.x,t1.y);ctx.lineTo(pos.x,pos.y);
      ctx.strokeStyle=tr?'rgba(255,159,0,0.15)':(this.excitatory?'rgba(57,255,20,0.15)':'rgba(255,45,120,0.15)');ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.moveTo(t2.x,t2.y);ctx.lineTo(pos.x,pos.y);
      ctx.strokeStyle=tr?'rgba(255,159,0,0.9)':(this.excitatory?'rgba(57,255,20,0.9)':'rgba(255,45,120,0.9)');ctx.lineWidth=1.5;ctx.lineCap='round';
      ctx.shadowColor=tr?'#ff9f00':(this.excitatory?'#39ff14':'#ff2d78');ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;
    }
  }
}

/* ══ NETWORK BUILD ══ */
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}

function buildNetwork(count){
  neurons=[];synapses=[];
  const pad=80;
  const pts=poissonDisc(W-pad*2,H-pad*2,60,[]); 
  for(let i=0;i<Math.min(count,pts.length);i++)
    neurons.push(new Neuron(pts[i].x+pad,pts[i].y+pad));
  // Fallback with minimum spacing check
  while(neurons.length<count){
    let placed=false;
    for(let t=0;t<60&&!placed;t++){
      const x=pad+Math.random()*(W-pad*2),y=pad+Math.random()*(H-pad*2);
      if(neurons.every(n=>Math.hypot(n.x-x,n.y-y)>=52)){neurons.push(new Neuron(x,y));placed=true;}
    }
    if(!placed) neurons.push(new Neuron(pad+Math.random()*(W-pad*2),pad+Math.random()*(H-pad*2)));
  }
  buildSynapses();
}

function buildSynapses(){
  synapses=[];
  for(const n of neurons){
    const cnt=SYN_PER[0]+Math.floor(Math.random()*(SYN_PER[1]-SYN_PER[0]+1));
    const cands=neurons.filter(o=>o!==n).map(o=>({o,d:Math.hypot(o.x-n.x,o.y-n.y)})).filter(({d})=>d<MAX_SYN_LEN).sort((a,b)=>a.d-b.d);
    for(const{o}of cands.slice(0,cnt))if(!synapses.find(s=>s.pre===n&&s.post===o))synapses.push(new Synapse(n,o));
  }
}

function addNeurons(n){
  const pad=80;
  // Pass existing neuron positions (subtract pad so coords are in same space as poisson)
  const existing=neurons.map(nu=>({x:nu.x-pad,y:nu.y-pad}));
  const newPts=poissonDisc(W-pad*2,H-pad*2,60,existing);
  let added=0;
  for(const pt of newPts){
    if(added>=n) break;
    neurons.push(new Neuron(pt.x+pad,pt.y+pad));
    added++;
  }
  // Spacing-checked fallback
  while(added<n){
    let placed=false;
    for(let t=0;t<80&&!placed;t++){
      const x=pad+Math.random()*(W-pad*2),y=pad+Math.random()*(H-pad*2);
      if(neurons.every(nu=>Math.hypot(nu.x-x,nu.y-y)>=52)){neurons.push(new Neuron(x,y));placed=true;}
    }
    if(!placed) neurons.push(new Neuron(pad+Math.random()*(W-pad*2),pad+Math.random()*(H-pad*2)));
    added++;
  }
  buildSynapses();
}

/* ══ HOMEOSTASIS ══ */
function updateHomeostasis(){
  const frac=neurons.filter(n=>n.fired).length/neurons.length;
  if(frac>TARGET_FRAC) globalLeak=Math.min(0.12,globalLeak+0.0015);
  else globalLeak=Math.max(0,globalLeak-0.0008);
}

/* ══ TRAINING ══ */
let trainMode=false, trainSeq=[], trainRecT=0, replayMode=false, replayTOs=[];
const trainStatus=document.getElementById('train-status');

function setStatus(msg,isReplay){
  if(!msg){trainStatus.className='';trainStatus.style.display='none';return;}
  trainStatus.className=isReplay?'show replay':'show';trainStatus.textContent=msg;
}
function updateTrainBtn(){
  const btn=document.getElementById('btn-train');
  btn.className='';
  if(trainMode){btn.classList.add('recording');btn.textContent='⏺ RECORDING…';}
  else if(replayMode){btn.classList.add('playing');btn.textContent='▶ REPLAYING';}
  else if(trainSeq.length>1){btn.textContent='▶ PLAY TRAINED';}
  else{btn.textContent='🧠 TRAIN';}
}
function toggleTrain(){
  if(replayMode) return;
  if(trainSeq.length>1&&!trainMode){playSequence();return;}
  if(!trainMode){
    trainMode=true;trainSeq=[];trainRecT=performance.now();
    setStatus('● REC — click neurons in sequence, then click TRAIN again to save');
    updateTrainBtn();
  } else {
    finishRecording();
  }
}
function finishRecording(){
  trainMode=false;
  if(trainSeq.length<2){trainSeq=[];setStatus('');updateTrainBtn();return;}
  const t0=trainSeq[0].time;
  trainSeq.forEach(s=>s.time-=t0);
  // Potentiate synapses between consecutive sequence neurons
  for(let i=0;i<trainSeq.length-1;i++){
    const pre=trainSeq[i].n, post=trainSeq[i+1].n;
    let syn=synapses.find(s=>s.pre===pre&&s.post===post);
    if(!syn){syn=new Synapse(pre,post);syn.weight=W_TRAINED;synapses.push(syn);}
    else syn.weight=W_TRAINED;
    pre.trainHL=true;post.trainHL=true;
  }
  setStatus(`✓ ${trainSeq.length} neurons trained — click TRAIN again to replay`);
  updateTrainBtn();
}
function playSequence(){
  if(trainSeq.length<2) return;
  replayMode=true;replayTOs.forEach(clearTimeout);replayTOs=[];
  setStatus(`▶ REPLAYING SEQUENCE (${trainSeq.length} neurons)`,true);updateTrainBtn();
  const rawDur=trainSeq[trainSeq.length-1].time;
  const scale=rawDur>3000?3000/rawDur:1;
  trainSeq.forEach(step=>{
    replayTOs.push(setTimeout(()=>{step.n.forcefire();step.n.replayFlash=35;},step.time*scale));
  });
  replayTOs.push(setTimeout(()=>{
    replayMode=false;setStatus(`✓ Sequence replayed — click TRAIN to replay again`);updateTrainBtn();
  },trainSeq[trainSeq.length-1].time*scale+700));
}
function checkSequenceTrigger(neuron){
  if(!trainSeq.length||replayMode||trainMode) return;
  if(neuron===trainSeq[0].n){
    // Spontaneous trigger of first neuron → auto-replay rest
    const rawDur=trainSeq[trainSeq.length-1].time;
    const scale=rawDur>2500?2500/rawDur:1;
    replayMode=true;replayTOs.forEach(clearTimeout);replayTOs=[];updateTrainBtn();
    for(let i=1;i<trainSeq.length;i++){
      const step=trainSeq[i];
      replayTOs.push(setTimeout(()=>{step.n.forcefire();step.n.replayFlash=35;},step.time*scale));
    }
    replayTOs.push(setTimeout(()=>{replayMode=false;updateTrainBtn();},trainSeq[trainSeq.length-1].time*scale+700));
  }
}

/* ══ UTILS ══ */
function stimulateRandom(){const n=neurons[Math.floor(Math.random()*neurons.length)];if(n)n.forcefire();}
function togglePause(){paused=!paused;document.getElementById('btn-pause').textContent=paused?'RESUME':'PAUSE';if(!paused)loop();}
function resetAll(){
  cancelAnimationFrame(animId);
  trainMode=false;trainSeq=[];replayMode=false;replayTOs.forEach(clearTimeout);replayTOs=[];
  globalLeak=0;updateTrainBtn();setStatus('');
  buildNetwork(200);paused=false;document.getElementById('btn-pause').textContent='PAUSE';loop();
}

/* ══ STATS ══ */
function updateStats(now){
  if(now-lastStatsUpdate<300) return;lastStatsUpdate=now;
  document.getElementById('sNeurons').textContent=neurons.length;
  document.getElementById('sSynapses').textContent=synapses.length;
  document.getElementById('sFiring').textContent=neurons.filter(n=>n.fired).length;
  const el=(now-lastSpikeReset)/1000;
  if(el>1){displayedSpikes=Math.round(spikeCount/el);spikeCount=0;lastSpikeReset=now;}
  document.getElementById('sSpikes').textContent=displayedSpikes;
}

/* ══ DRAW ══ */
function drawBackground(){
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(10,26,46,0.09)';ctx.lineWidth=0.5;
  const gs=60;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(2,8,16,0.8)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

/* ══ LOOP ══ */
function loop(){
  if(paused) return;
  const now=performance.now();
  drawBackground();
  if(now-lastHomeoT>120){updateHomeostasis();lastHomeoT=now;}
  for(const s of synapses){s.update();s.draw();}
  for(const n of neurons){n.update(now);n.draw(now);}
  // Dispatch pulses for neurons that just fired this frame
  for(const n of neurons){
    if(n.fired&&now-n.fireTime<20){
      for(const s of synapses) if(s.pre===n&&s.pulses.length===0) s.addPulse();
    }
  }
  updateStats(now);
  animId=requestAnimationFrame(loop);
}

/* ══ CANVAS CLICK ══ */
canvas.addEventListener('click',e=>{
  if(reader.style.display==='block') return;
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let best=null,bestD=Infinity;
  for(const n of neurons){const d=Math.hypot(n.x-mx,n.y-my);if(d<bestD){bestD=d;best=n;}}
  if(trainMode){
    if(bestD<52&&best){
      best.forcefire();best.replayFlash=20;
      trainSeq.push({n:best,time:performance.now()-trainRecT});
      setStatus(`● REC — ${trainSeq.length} neurons (click TRAIN to save)`);
    }
    return;
  }
  if(bestD<40) best.forcefire();
  else{neurons.push(new Neuron(mx,my));buildSynapses();}
});

window.addEventListener('resize',()=>{resize();buildSynapses();});
resize();buildNetwork(200);
setTimeout(()=>{for(let i=0;i<5;i++)setTimeout(stimulateRandom,i*180);},400);
loop();
</script>
